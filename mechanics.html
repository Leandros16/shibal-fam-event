<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tournament Mechanics · Audition NextGen Fam Battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #07070d;
    color: #f4f4f8;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: auto;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 1200px 600px at 20% 0%, rgba(16, 185, 129, 0.10), transparent 60%),
      radial-gradient(ellipse 1200px 600px at 80% 100%, rgba(251, 113, 36, 0.10), transparent 60%),
      radial-gradient(ellipse 800px 600px at 50% 50%, rgba(168, 85, 247, 0.08), transparent 70%),
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: auto, auto, auto, 48px 48px, 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const ADMIN_KEY = 'shibalfam2026';
const params = new URLSearchParams(window.location.search);
const IS_ADMIN = params.get('admin') === ADMIN_KEY;

const C = {
  bg: "#07070d",
  emerald: "#10b981",
  emeraldText: "#6ee7b7",
  orange: "#fb7124",
  orangeText: "#fdba74",
  purple: "#a855f7",
  purpleText: "#e9d5ff",
  pink: "#ec4899",
  pinkText: "#fbcfe8",
  gold: "#fbbf24",
  cyan: "#22d3ee",
};

function SectionHeader({ number, title, subtitle, accent }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 16, marginBottom: 24,
    }}>
      <div style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 14, fontWeight: 700,
        color: accent,
        padding: "6px 12px",
        border: `1.5px solid ${accent}`,
        borderRadius: 6,
        boxShadow: `0 0 24px ${accent}55`,
        background: `${accent}1A`,
      }}>{number}</div>
      <div>
        <div style={{
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 36, letterSpacing: 3, color: "#fff",
          textShadow: `0 0 20px ${accent}55`,
          lineHeight: 1,
        }}>{title}</div>
        {subtitle && (
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 11, color: "rgba(255,255,255,0.5)",
            letterSpacing: 2, marginTop: 4,
          }}>{subtitle}</div>
        )}
      </div>
      <div style={{
        flex: 1, height: 2,
        background: `linear-gradient(90deg, ${accent}, transparent)`,
        boxShadow: `0 0 12px ${accent}`,
      }} />
    </div>
  );
}

function Card({ accent, children, title, kicker, padding = 20, style = {} }) {
  return (
    <div style={{
      position: "relative",
      padding,
      border: `1.5px solid ${accent}88`,
      borderRadius: 14,
      background: `linear-gradient(180deg, ${accent}14, rgba(8,8,14,0.9))`,
      boxShadow: `0 0 16px ${accent}33, 0 12px 40px rgba(0,0,0,0.4)`,
      ...style,
    }}>
      {kicker && (
        <div style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 10, letterSpacing: 3,
          color: accent, marginBottom: 8,
        }}>{kicker}</div>
      )}
      {title && (
        <div style={{
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 24, letterSpacing: 2, color: "#fff",
          marginBottom: 12, lineHeight: 1,
        }}>{title}</div>
      )}
      {children}
    </div>
  );
}

function StatTile({ label, value, color }) {
  return (
    <div style={{
      padding: "16px 20px",
      border: `1px solid ${color}55`,
      borderRadius: 10,
      background: `linear-gradient(180deg, ${color}14, rgba(8,8,14,0.5))`,
    }}>
      <div style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 10, letterSpacing: 2, color: "rgba(255,255,255,0.5)",
      }}>{label}</div>
      <div style={{
        fontFamily: "'Bebas Neue', sans-serif",
        fontSize: 36, color, marginTop: 4, lineHeight: 1,
        textShadow: `0 0 12px ${color}88`,
        letterSpacing: 1,
      }}>{value}</div>
    </div>
  );
}

function Pill({ children, color }) {
  return (
    <span style={{
      padding: "4px 10px",
      borderRadius: 999,
      border: `1px solid ${color}66`,
      background: `${color}1A`,
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 10, letterSpacing: 1.5, color,
    }}>{children}</span>
  );
}

function NumberedItem({ n, accent, title, body }) {
  return (
    <div style={{
      display: "grid", gridTemplateColumns: "auto 1fr", gap: 14,
      padding: "14px 16px",
      borderLeft: `2px solid ${accent}`,
      background: `linear-gradient(90deg, ${accent}10, transparent 80%)`,
      borderRadius: "0 10px 10px 0",
    }}>
      <div style={{
        fontFamily: "'Bebas Neue', sans-serif",
        fontSize: 32, color: accent, lineHeight: 1,
        textShadow: `0 0 10px ${accent}66`,
        minWidth: 36,
      }}>{n}</div>
      <div>
        <div style={{
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 20, letterSpacing: 1.5, color: "#fff",
          lineHeight: 1.1,
        }}>{title}</div>
        <div style={{
          fontFamily: "'Space Grotesk', sans-serif",
          fontSize: 14, lineHeight: 1.5,
          color: "rgba(255,255,255,0.72)",
          marginTop: 6,
        }}>{body}</div>
      </div>
    </div>
  );
}

function NavBar({ active }) {
  const adminParam = IS_ADMIN ? '?admin=' + ADMIN_KEY : '';
  return (
    <div style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "rgba(7,7,13,0.92)",
      backdropFilter: "blur(12px)",
      borderBottom: "1px solid rgba(255,255,255,0.08)",
      padding: "0 48px",
    }}>
      <div style={{
        maxWidth: 1720, margin: "0 auto",
        display: "flex", alignItems: "center", gap: 6,
        height: 52,
      }}>
        <div style={{
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 20, letterSpacing: 2, color: "#fff",
          marginRight: 24,
        }}>SHIBAL FAM</div>
        {[
          { label: "BRACKET", href: "index.html" + adminParam, key: "bracket" },
          { label: "MECHANICS", href: "mechanics.html" + adminParam, key: "mechanics" },
        ].map(tab => (
          <a key={tab.key} href={tab.href} style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 11, letterSpacing: 2,
            padding: "8px 16px",
            borderRadius: 6,
            color: active === tab.key ? "#fff" : "rgba(255,255,255,0.5)",
            background: active === tab.key ? "rgba(168,85,247,0.2)" : "transparent",
            border: active === tab.key ? "1px solid rgba(168,85,247,0.4)" : "1px solid transparent",
            textDecoration: "none",
            transition: "all 0.2s",
          }}>{tab.label}</a>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <div>
      <NavBar active="mechanics" />
      <div style={{
        minWidth: 1480, maxWidth: 1720, margin: "0 auto",
        padding: "40px 48px 80px",
      }}>
      {/* ---------- HERO ---------- */}
      <header style={{
        padding: "32px 0 28px",
        borderBottom: "1px solid rgba(255,255,255,0.08)",
        marginBottom: 48,
      }}>
        <div style={{
          display: "flex", alignItems: "flex-end", justifyContent: "space-between",
          gap: 32, flexWrap: "wrap",
        }}>
          <div>
            <div style={{
              display: "flex", alignItems: "center", gap: 12, marginBottom: 12,
            }}>
              <div style={{
                width: 10, height: 10, background: C.purple, borderRadius: 2,
                boxShadow: `0 0 12px ${C.purple}`,
              }} />
              <span style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 12, letterSpacing: 3, color: C.purple,
              }}>AUDITION NEXTGEN · FAM BATTLE · OFFICIAL RULEBOOK</span>
            </div>
            <h1 style={{
              fontFamily: "'Bebas Neue', sans-serif",
              fontSize: 112, lineHeight: 0.9, letterSpacing: 2,
              margin: 0,
              background: `linear-gradient(180deg, #fff 0%, #fff 55%, ${C.purple}B3 100%)`,
              WebkitBackgroundClip: "text",
              WebkitTextFillColor: "transparent",
              textShadow: `0 0 60px ${C.purple}40`,
            }}>
              TOURNAMENT<br/>MECHANICS
            </h1>
            <div style={{
              fontSize: 18, color: "rgba(255,255,255,0.6)",
              marginTop: 10, maxWidth: 660,
            }}>
              Every rule, song-pool detail, schedule, and call you need to know — from song submissions to the All-Star showcase.
            </div>
          </div>

          <div style={{
            display: "grid", gridTemplateColumns: "repeat(4, auto)", gap: 12,
          }}>
            <StatTile label="MODE" value="FAM 3v3" color={C.emerald} />
            <StatTile label="SERIES" value="RACE-3" color={C.cyan} />
            <StatTile label="SONG POOL" value="24" color={C.purple} />
            <StatTile label="EVENT DATE" value="05·16" color={C.pink} />
          </div>
        </div>
      </header>

      {/* =========================================================
          01 · MATCH FORMAT
      ========================================================= */}
      <section style={{ marginBottom: 56 }}>
        <SectionHeader number="01" title="MATCH FORMAT" subtitle="HOW EACH FAM BATTLE IS PLAYED" accent={C.emerald} />

        <div style={{
          display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 24,
        }}>
          <Card accent={C.emerald} kicker="// SERIES LENGTH" title="FAM BATTLE · RACE TO 3 WINS" padding={24}>
            <p style={{
              margin: 0, fontSize: 15, lineHeight: 1.6,
              color: "rgba(255,255,255,0.78)",
            }}>
              Every match is played in <b style={{color:C.emeraldText}}>Fam Battle (3v3)</b>. The first team to win <b style={{color:C.emeraldText}}>3 songs</b> takes the match. Matches run between <b>3 and 5 songs</b> depending on results.
            </p>

            <div style={{
              display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8,
              marginTop: 18,
            }}>
              {[
                { g: "S1", state: "PLAYED" },
                { g: "S2", state: "PLAYED" },
                { g: "S3", state: "PLAYED" },
                { g: "S4", state: "IF NEEDED" },
                { g: "S5", state: "IF NEEDED" },
              ].map(x => (
                <div key={x.g} style={{
                  padding: "10px 8px",
                  border: `1px dashed ${C.emerald}66`,
                  borderRadius: 10,
                  background: "rgba(0,0,0,0.4)",
                  textAlign: "center",
                }}>
                  <div style={{
                    fontFamily: "'Bebas Neue', sans-serif", fontSize: 24,
                    color: "#fff", lineHeight: 1, letterSpacing: 1,
                  }}>{x.g}</div>
                  <div style={{
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 8, letterSpacing: 1.5, color: C.emeraldText,
                    marginTop: 6,
                  }}>{x.state}</div>
                </div>
              ))}
            </div>

            <div style={{ marginTop: 18, display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Pill color={C.emerald}>3v3 FAM BATTLE</Pill>
              <Pill color={C.emerald}>FIRST TO 3 WINS</Pill>
              <Pill color={C.emerald}>MIN 4 MIN / SONG</Pill>
              <Pill color={C.emerald}>NO REMAKES</Pill>
            </div>
          </Card>

          <Card accent={C.emerald} kicker="// KEY RULES" title="BEFORE YOU PLAY" padding={24}>
            <div style={{ display: "grid", gap: 8 }}>
              {[
                "All 3 players must be online & ready before song start.",
                "Disconnects mid-song = song is replayed once. A second DC = lost song.",
                "Highest team score on the result screen wins the song.",
                "Match results are recorded by admin via screenshot.",
              ].map(line => (
                <div key={line} style={{
                  display: "grid", gridTemplateColumns: "auto 1fr", gap: 10,
                  padding: "10px 12px",
                  background: "rgba(0,0,0,0.35)",
                  border: "1px solid rgba(255,255,255,0.08)",
                  borderRadius: 8,
                  alignItems: "start",
                }}>
                  <span style={{
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 12, color: C.emerald, fontWeight: 700,
                  }}>›</span>
                  <span style={{
                    fontSize: 13, color: "rgba(255,255,255,0.78)", lineHeight: 1.5,
                  }}>{line}</span>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </section>

      {/* =========================================================
          02 · SONG POOL & SUBMISSIONS
      ========================================================= */}
      <section style={{ marginBottom: 56 }}>
        <SectionHeader number="02" title="SONG POOL & SUBMISSIONS" subtitle="WHAT EACH TEAM BRINGS TO THE FLOOR" accent={C.cyan} />

        <div style={{
          display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24,
        }}>
          <Card accent={C.cyan} kicker="// SUBMISSION RULES" title="6 SONGS · 2 DAYS BEFORE" padding={24}>
            <p style={{
              margin: 0, fontSize: 14, lineHeight: 1.6,
              color: "rgba(255,255,255,0.78)",
            }}>
              Every team must submit <b style={{color:C.cyan}}>6 songs</b> to the admin team <b style={{color:C.cyan}}>at least 2 days before the event</b>. These are pooled with every other team's submissions into one combined event pool.
            </p>

            <div style={{
              marginTop: 18, padding: 18,
              border: `1.5px dashed ${C.cyan}66`,
              borderRadius: 12,
              background: "rgba(0,0,0,0.4)",
              textAlign: "center",
            }}>
              <div style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 10, letterSpacing: 2, color: C.cyan,
              }}>COMBINED POOL</div>
              <div style={{
                display: "flex", alignItems: "baseline", justifyContent: "center",
                gap: 14, marginTop: 8,
              }}>
                <span style={{
                  fontFamily: "'Bebas Neue', sans-serif",
                  fontSize: 28, color: "rgba(255,255,255,0.75)",
                }}>4 TEAMS</span>
                <span style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 18, color: C.cyan,
                }}>×</span>
                <span style={{
                  fontFamily: "'Bebas Neue', sans-serif",
                  fontSize: 28, color: "rgba(255,255,255,0.75)",
                }}>6 SONGS</span>
                <span style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 18, color: C.cyan,
                }}>=</span>
                <span style={{
                  fontFamily: "'Bebas Neue', sans-serif",
                  fontSize: 56, color: "#fff",
                  textShadow: `0 0 20px ${C.cyan}88`,
                }}>24</span>
              </div>
              <div style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 11, letterSpacing: 1.5,
                color: "rgba(255,255,255,0.5)", marginTop: 4,
              }}>SONGS IN THE COMBINED POOL</div>
            </div>

            <div style={{ marginTop: 14, display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Pill color={C.cyan}>DUE 48H BEFORE</Pill>
              <Pill color={C.cyan}>NO DUPLICATES</Pill>
              <Pill color={C.cyan}>ADMIN APPROVAL</Pill>
            </div>
          </Card>

          <Card accent={C.cyan} kicker="// POOL BEHAVIOR" title="HOW THE POOL WORKS" padding={24}>
            <div style={{ display: "grid", gap: 10 }}>
              <NumberedItem n="01" accent={C.cyan} title="Pool resets every match"
                body="Each new match starts with the full 24-song pool. Songs banned or played in a previous match are back in play." />
              <NumberedItem n="02" accent={C.cyan} title="Songs are tracked by admin"
                body="Admins maintain a live song-tracker showing which songs are picked, banned, or remaining inside each match." />
              <NumberedItem n="03" accent={C.cyan} title="Late or invalid submissions"
                body="Teams that miss the 48-hour deadline forfeit their slots in the pool — the match still proceeds with the remaining songs." />
            </div>
          </Card>
        </div>
      </section>

      {/* =========================================================
          03 · PICK + VETO FLOW
      ========================================================= */}
      <section style={{ marginBottom: 56 }}>
        <SectionHeader number="03" title="PICK + VETO FLOW" subtitle="HOW SONGS ARE CHOSEN INSIDE A MATCH" accent={C.purple} />

        <Card accent={C.purple} padding={26}>
          <div style={{
            display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14,
          }}>
            {[
              {
                step: "01",
                title: "SONG 1",
                head: "RANDOM ROLL",
                body: "Admin randomly selects the opening song from the full 24-song combined pool.",
                color: C.purple,
              },
              {
                step: "02",
                title: "AFTER SONG 1",
                head: "LOSER BANS 5",
                body: "The team that lost Song 1 bans exactly 5 songs from the pool — one time only.",
                color: C.orange,
              },
              {
                step: "03",
                title: "SONGS 2 → 5",
                head: "WINNER PICKS",
                body: "After every following song, the winner of the previous song picks the next from the remaining pool.",
                color: C.emerald,
              },
              {
                step: "04",
                title: "MATCH ENDS",
                head: "FIRST TO 3",
                body: "First team to reach 3 song wins takes the match. The pool then resets for the next match.",
                color: C.gold,
              },
            ].map(s => (
              <div key={s.step} style={{
                position: "relative",
                padding: 16,
                border: `1.5px solid ${s.color}77`,
                borderRadius: 12,
                background: `linear-gradient(180deg, ${s.color}14, rgba(8,8,14,0.6))`,
                boxShadow: `0 0 16px ${s.color}33`,
              }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 10, letterSpacing: 2, color: s.color,
                }}>STEP {s.step}</div>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 11, color: "rgba(255,255,255,0.55)", marginTop: 2, letterSpacing: 1.5,
                }}>{s.title}</div>
                <div style={{
                  fontFamily: "'Bebas Neue', sans-serif",
                  fontSize: 26, letterSpacing: 1.5, color: "#fff",
                  marginTop: 8, lineHeight: 1,
                  textShadow: `0 0 12px ${s.color}55`,
                }}>{s.head}</div>
                <div style={{
                  fontSize: 13, color: "rgba(255,255,255,0.72)", marginTop: 8,
                  lineHeight: 1.5,
                }}>{s.body}</div>
              </div>
            ))}
          </div>

          <div style={{
            marginTop: 22,
            padding: "14px 18px",
            border: `1px solid ${C.purple}33`,
            borderRadius: 10,
            background: `${C.purple}0D`,
            display: "flex", gap: 18, alignItems: "center", flexWrap: "wrap",
          }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 11, letterSpacing: 2, color: C.purpleText,
            }}>⚙ POOL MATH</span>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 12, color: "rgba(255,255,255,0.7)",
            }}>24 songs in pool → 1 played (S1) → 5 banned → <b style={{color:"#fff"}}>18 songs left</b> for songs 2 through 5.</span>
          </div>
        </Card>
      </section>

      {/* =========================================================
          04 · BRACKET FLOW
      ========================================================= */}
      <section style={{ marginBottom: 56 }}>
        <SectionHeader number="04" title="BRACKET FLOW" subtitle="HOW TEAMS PROGRESS THROUGH THE EVENT" accent={C.orange} />

        <div style={{
          display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24,
        }}>
          <Card accent={C.emerald} kicker="WIN A WB MATCH" title="STAY ON THE UPPER ROAD" padding={22}>
            <ul style={{ margin: 0, paddingLeft: 18, lineHeight: 1.7, color: "rgba(255,255,255,0.78)", fontSize: 14 }}>
              <li>Advance to the next Winners Bracket round.</li>
              <li>Carry a clean record into Grand Finals seeding.</li>
              <li>The WB Champion is seeded directly into Match 06 (Grand Finals).</li>
            </ul>
          </Card>

          <Card accent={C.orange} kicker="LOSE A WB MATCH" title="DROP TO LOSERS" padding={22}>
            <ul style={{ margin: 0, paddingLeft: 18, lineHeight: 1.7, color: "rgba(255,255,255,0.78)", fontSize: 14 }}>
              <li>You're not out — drop to the Losers Bracket.</li>
              <li>Win out through LB Round 1 → LB Finals to reach Grand Finals.</li>
              <li>Lose once in the Losers Bracket and you're eliminated.</li>
            </ul>
          </Card>

          <Card accent={C.purple} kicker="GRAND FINALS · MATCH 06" title="ONE MATCH · ONE CHAMPION" padding={22}>
            <p style={{ margin: 0, fontSize: 14, lineHeight: 1.6, color: "rgba(255,255,255,0.78)" }}>
              The WB Champion faces the LB Champion in a single <b style={{color:C.purpleText}}>Race to 3</b> Fam Battle. Winner is crowned <b style={{color:C.gold}}>Grand Champion</b>.
            </p>
            <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Pill color={C.purple}>NO BRACKET RESET</Pill>
              <Pill color={C.gold}>WINNER TAKES THE TITLE</Pill>
            </div>
          </Card>

          <Card accent={C.pink} kicker="POST-FINALS" title="ALL-STAR SHOWCASE" padding={22}>
            <p style={{ margin: 0, fontSize: 14, lineHeight: 1.6, color: "rgba(255,255,255,0.78)" }}>
              After Grand Finals, the Top 3 players by <b style={{color:C.pinkText}}>average Perfect Chain</b> form an All-Star squad and face the <b style={{color:C.gold}}>Grand Champion team</b> in a Race-to-3 exhibition.
            </p>

function hexToRgba(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

/* ----------------------------------------------------------
   BRACKET FLOW LOGIC
---------------------------------------------------------- */
const bracketFlow = {
  match1: { winnerTo: { match: 'match3', slot: 'top' }, loserTo: { match: 'match4', slot: 'top' } },
  match2: { winnerTo: { match: 'match3', slot: 'bottom' }, loserTo: { match: 'match4', slot: 'bottom' } },
  match3: { winnerTo: { match: 'match6', slot: 'top' }, loserTo: { match: 'match5', slot: 'bottom' } },
  match4: { winnerTo: { match: 'match5', slot: 'top' }, loserTo: null },
  match5: { winnerTo: { match: 'match6', slot: 'bottom' }, loserTo: null },
  match6: { winnerTo: null, loserTo: null },
};

function computeBracket(results) {
  const slots = {
    match1: { top: 'A', bottom: 'D' },
    match2: { top: 'B', bottom: 'C' },
    match3: { top: null, bottom: null },
    match4: { top: null, bottom: null },
    match5: { top: null, bottom: null },
    match6: { top: null, bottom: null },
  };

  const matchOrder = ['match1', 'match2', 'match3', 'match4', 'match5', 'match6'];

  for (const matchId of matchOrder) {
    const winner = results[matchId];
    if (!winner) continue;

    const mt = slots[matchId];
    if (!mt.top || !mt.bottom) continue;

    const loser = mt.top === winner ? mt.bottom : mt.top;
    const flow = bracketFlow[matchId];

    if (flow.winnerTo) {
      slots[flow.winnerTo.match][flow.winnerTo.slot] = winner;
    }
    if (flow.loserTo && loser) {
      slots[flow.loserTo.match][flow.loserTo.slot] = loser;
    }
  }

  return slots;
}

function getDependentMatches(matchId) {
  const deps = [];
  function find(mId) {
    const flow = bracketFlow[mId];
    if (flow.winnerTo) { deps.push(flow.winnerTo.match); find(flow.winnerTo.match); }
    if (flow.loserTo) { deps.push(flow.loserTo.match); find(flow.loserTo.match); }
  }
  find(matchId);
  return [...new Set(deps)];
}

  if (variant === "pair-down") {
    return (
      <svg width={w} height="100%" viewBox={`0 0 ${w} 240`} preserveAspectRatio="none"
        style={{ display: "block", filter: `drop-shadow(0 0 4px ${glow})` }}>
        <path d={`M 0 60 H ${w/2} V 180 H 0`} fill="none" stroke={stroke} strokeWidth="2" />
        <path d={`M ${w/2} 120 H ${w}`} fill="none" stroke={stroke} strokeWidth="2" />
        <circle cx={w} cy="120" r="3" fill={stroke} />

  }
  if (variant === "single-right") {

  }
  return null;
}

/* ----------------------------------------------------------
   SLOT RENDERER — decides TeamCard vs TBDCard
---------------------------------------------------------- */
function SlotRenderer({ teamKey, theme, matchId, slotPos, results, slots, onSelectWinner }) {
  if (!teamKey || !teams[teamKey]) {
    const labels = {
      match3: { top: "Winner of Match 1", bottom: "Winner of Match 2" },
      match4: { top: "Loser of Match 1", bottom: "Loser of Match 2" },
      match5: { top: "Winner of Match 4", bottom: "Loser of Match 3" },
      match6: { top: "Winners Bracket Champion", bottom: "Losers Bracket Champion" },
    };
    const label = labels[matchId]?.[slotPos] || "TBD";
    return <TBDCard label={label} theme={theme} />;
  }

  const team = teams[teamKey];
  const matchSlots = slots[matchId];
  const bothFilled = matchSlots.top && matchSlots.bottom;
  const hasResult = !!results[matchId];
  const isWinner = hasResult && results[matchId] === teamKey;
  const isLoser = hasResult && results[matchId] !== teamKey;
  const clickable = IS_ADMIN && bothFilled && !hasResult;

  return (
    <TeamCard
      team={team}
      theme={theme}
      isWinner={isWinner}
      isLoser={isLoser}
      clickable={clickable}
      onClick={() => onSelectWinner(matchId, teamKey)}
    />
  );
}

/* ----------------------------------------------------------
   APP
---------------------------------------------------------- */
function App() {
  const [results, setResults] = useState({});
  const [fbReady, setFbReady] = useState(false);

  // Initialize Firebase listener
  useEffect(() => {
    try {
      firebaseDB.ref('bracket').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        setResults(data);
      });
      setFbReady(true);
    } catch (err) {
      console.error("Firebase listen error:", err);
    }
  }, []);

  const slots = computeBracket(results);
  const champion = results.match6 || null;

  function selectWinner(matchId, teamKey) {
    if (!IS_ADMIN || !fbReady) return;
    const team = teams[teamKey];
    if (!confirm(`Set ${team.name} (${team.players.join(', ')}) as winner of ${matchId.replace('match', 'Match ')}?`)) return;
    firebaseDB.ref('bracket/' + matchId).set(teamKey);
  }

  function undoMatch(matchId) {
    if (!IS_ADMIN || !fbReady) return;
    const deps = getDependentMatches(matchId);
    const affectedCount = deps.filter(d => results[d]).length;
    let msg = `Undo ${matchId.replace('match', 'Match ')}?`;
    if (affectedCount > 0) msg += ` This will also clear ${affectedCount} downstream match(es).`;
    if (!confirm(msg)) return;

    firebaseDB.ref('bracket/' + matchId).remove();
    for (const dep of deps) {
      firebaseDB.ref('bracket/' + dep).remove();
    }
  }

  function resetBracket() {
    if (!IS_ADMIN || !fbReady) return;
    if (!confirm('Reset the ENTIRE bracket? This cannot be undone.')) return;
    if (!confirm('Are you absolutely sure? All match results will be erased.')) return;
    firebaseDB.ref('bracket').remove();
  }

  function renderSlot(matchId, slotPos, theme) {
    return (
      <SlotRenderer

            { place: "4TH", label: "FINALIST", cash: "—", perPlayer: "PARTICIPATION", extras: "ANY EMOTICONS · 30 DAYS", color: "#94a3b8", accent: "#64748b", icon: "✦" },
          ].map((p) => (
            <div key={p.place} style={{
              position: "relative", padding: 20,
              border: `1.5px solid ${p.color}`, borderRadius: 14,
              background: `linear-gradient(180deg, ${hexToRgba(p.color, 0.10)}, rgba(8,8,14,0.95))`,
              boxShadow: p.big
                ? `0 0 32px ${hexToRgba(p.color, 0.45)}, 0 20px 60px rgba(0,0,0,0.5)`
                : `0 0 16px ${hexToRgba(p.color, 0.20)}, 0 12px 40px rgba(0,0,0,0.4)`,
              transform: p.big ? "translateY(-6px)" : "none",
            }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{
                  fontFamily: "'Bebas Neue', sans-serif",
                  fontSize: p.big ? 64 : 52, lineHeight: 0.9, color: p.color,
                  textShadow: `0 0 16px ${hexToRgba(p.color, 0.5)}`, letterSpacing: 1,
                }}>{p.place}</div>
                <div style={{ fontSize: p.big ? 40 : 32, lineHeight: 1 }}>{p.icon}</div>
              </div>
              <div style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 10, letterSpacing: 3, color: p.color, marginBottom: 14,
              }}>{p.label}</div>
              <div style={{
                padding: "12px 14px", background: "rgba(0,0,0,0.5)",
                border: `1px dashed ${hexToRgba(p.color, 0.5)}`, borderRadius: 10, marginBottom: 10,
              }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 9, letterSpacing: 2, color: "rgba(255,255,255,0.5)",
                }}>CASH</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 2 }}>
                  <span style={{
                    fontFamily: "'Bebas Neue', sans-serif",
                    fontSize: p.big ? 44 : 36, color: "#fff",
                    textShadow: `0 0 12px ${hexToRgba(p.color, 0.6)}`, lineHeight: 1, letterSpacing: 1,
                  }}>{p.cash}</span>
                  {p.cash !== "—" && (
                    <span style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 9, color: "rgba(255,255,255,0.5)", letterSpacing: 1.5,
                    }}>{p.perPlayer}</span>
                  )}
                </div>
              </div>
              <div style={{
                padding: "10px 14px", background: "rgba(0,0,0,0.3)",
                border: `1px solid ${hexToRgba(p.color, 0.3)}`, borderRadius: 10,
                display: "flex", alignItems: "center", gap: 8,
              }}>
                <span style={{ fontSize: 18 }}>✦</span>
                <span style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 11, color: "rgba(255,255,255,0.85)", letterSpacing: 1,
                }}>{p.extras}</span>
              </div>
            </div>
          ))}
        </div>

        {/* All-Star Showcase Bonus */}
        <div style={{
          padding: "18px 22px",
          border: `1.5px solid ${themes.allstar.border}`,
          borderRadius: 14,
          background: `linear-gradient(90deg, rgba(236,72,153,0.18), rgba(168,85,247,0.10), rgba(251,191,36,0.10))`,
          boxShadow: themes.allstar.glow,
          display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap",
          justifyContent: "space-between",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <div style={{
              padding: "6px 12px",
              border: `1px solid ${themes.allstar.border}`,
              borderRadius: 999,
              background: themes.allstar.chip,
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 11, letterSpacing: 2, color: themes.allstar.text,
            }}>★ BONUS</div>
            <div>
              <div style={{
                fontFamily: "'Bebas Neue', sans-serif",
                fontSize: 28, color: "#fff", letterSpacing: 2, lineHeight: 1,
              }}>ALL-STAR SHOWCASE WINNERS</div>
              <div style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 11, color: "rgba(255,255,255,0.6)", letterSpacing: 1.5, marginTop: 4,
              }}>WINNING SIDE OF THE EXHIBITION SHARES THE POT</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
            <span style={{
              fontFamily: "'Bebas Neue', sans-serif",
              fontSize: 56, lineHeight: 1, letterSpacing: 1, color: "#fff",
              textShadow: `0 0 20px ${themes.allstar.accent}`,
            }}>₱2,000</span>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 11, color: themes.allstar.text, letterSpacing: 2,
            }}>TOTAL POT</span>
          </div>
        </div>
      </section>

      {/* ---------- FOOTER ---------- */}
      <footer style={{
        marginTop: 56, paddingTop: 24,
        borderTop: "1px solid rgba(255,255,255,0.08)",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        flexWrap: "wrap", gap: 16,
      }}>
        <div style={{
          display: "flex", alignItems: "center", gap: 16,
        }}>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 11, letterSpacing: 2, color: "rgba(255,255,255,0.4)",
          }}>
            BRACKET v2.0 · DOUBLE-ELIM · 4 TEAMS · 6 MATCHES + 1 SHOWCASE
          </div>
          {IS_ADMIN && (
            <button
              onClick={resetBracket}
              style={{
                padding: "4px 12px",
                background: "rgba(255,65,80,0.12)",
                border: "1px solid rgba(255,65,80,0.3)",
                borderRadius: 4,
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 9, letterSpacing: 2, color: "#ff4150",
                cursor: "pointer",
              }}
            >⟲ RESET ALL</button>
          )}
        </div>
        <div style={{ display: "flex", gap: 12 }}>
          {Object.entries(themes).map(([k, t]) => (
            <div key={k} style={{
              display: "flex", alignItems: "center", gap: 6,
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 10, color: "rgba(255,255,255,0.5)", letterSpacing: 1.5,
            }}>
              <span style={{
                width: 10, height: 10, borderRadius: 2,
                background: t.accent, boxShadow: `0 0 8px ${t.accent}`,
              }} />
              {t.name}
            </div>
          ))}
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
